name: LLVM Coverage (Bulletproof Unified)

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cxx_std: [17, 20]

    env:
      COVERAGE_ROOT: ${{ github.workspace }}/.coverage

    steps:
      - uses: actions/checkout@v4

      # ---------------------------
      # Install LLVM
      # ---------------------------
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set LLVM env (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }} \
            -DLINALG_ENABLE_TESTS=ON \
            -DLINALG_ENABLE_COVERAGE=ON \
            -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang \
            -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++

      - name: Configure (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }} -DLINALG_ENABLE_TESTS=ON

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build
        run: cmake --build build -j

      # ---------------------------
      # Prepare coverage directory (CRITICAL)
      # ---------------------------
      - name: Setup coverage root
        if: runner.os == 'macOS'
        run: |
          mkdir -p $COVERAGE_ROOT/cxx${{ matrix.cxx_std }}

      # ---------------------------
      # Run tests (OS-safe profraw path)
      # ---------------------------
      - name: Run tests with coverage
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export LLVM_PROFILE_FILE="$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}/%p.profraw"

          ctest --test-dir build --output-on-failure

      - name: Run tests without coverage
        if: runner.os != 'macOS'
        run: |
          ctest --test-dir build --output-on-failure

      # ---------------------------
      # Debug (always useful)
      # ---------------------------
      - name: Debug profraw output
        if: runner.os == 'macOS'
        run: |
          find $COVERAGE_ROOT -name "*.profraw" -print || true

      # ---------------------------
      # Merge profraw → profdata
      # ---------------------------
      - name: Merge coverage
        if: runner.os == 'macOS'
        run: |
          $LLVM_PREFIX/bin/llvm-profdata merge -sparse \
            $COVERAGE_ROOT/cxx${{ matrix.cxx_std }}/*.profraw \
            -o $COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.profdata

      # ---------------------------
      # Select binaries (NO assumptions)
      # ---------------------------
      - name: Locate test binaries (correct way)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp build/coverage_binaries.txt $COVERAGE_ROOT/binaries-${{ matrix.cxx_std }}.txt

      - name: Validate binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Binaries used for coverage:"
          cat $COVERAGE_ROOT/binaries-${{ matrix.cxx_std }}.txt
      
          while read bin; do
            if [ ! -f "$bin" ]; then
              echo "Missing binary: $bin"
              exit 1
            fi
          done < $COVERAGE_ROOT/binaries-${{ matrix.cxx_std }}.txt
      
      # ---------------------------
      # Generate LCOV (CORRECT)
      # ---------------------------
      - name: Generate LCOV
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BINS=()
          while IFS= read -r line; do
            [ -n "$line" ] && BINS+=("$line")
          done < "$COVERAGE_ROOT/binaries-${{ matrix.cxx_std }}.txt"

          echo "Using binaries:"
          printf '%s\n' "${BINS[@]}"

          echo "=== Checking binary/profile compatibility ==="
          for bin in "${BINS[@]}"; do
            $LLVM_PREFIX/bin/llvm-cov show "$bin" \
              -instr-profile="$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.profdata" \
              >/dev/null 2>&1 \
              && echo "OK: $bin" \
              || echo "MISMATCH: $bin"
          done

          $LLVM_PREFIX/bin/llvm-cov export \
            "${BINS[@]}" \
            -instr-profile="$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.profdata" \
            --format=lcov \
            --compilation-dir="$GITHUB_WORKSPACE" \
            -ignore-filename-regex='(test|build|_deps)' \
            > "$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.lcov"

          wc -l $COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.lcov

          llvm-profdata show \
            "$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.profdata" | head -50

          for bin in "${BINS[@]}"; do
            llvm-cov report "${bin}" -instr-profile="$COVERAGE_ROOT/cxx${{ matrix.cxx_std }}.profdata"
          done

      # ---------------------------
      # Upload LCOV artifact
      # ---------------------------
      - name: Upload coverage artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.cxx_std }}
          path: .coverage

      # ---------------------------
      # Codecov
      # ---------------------------
      - name: Upload to Codecov
        if: runner.os == 'macOS'
        uses: codecov/codecov-action@v5
        with:
          files: .coverage/cxx${{ matrix.cxx_std }}.lcov
          flags: cxx${{ matrix.cxx_std }}
          name: cxx${{ matrix.cxx_std }}
          token: ${{ secrets.CODECOV_TOKEN }}
