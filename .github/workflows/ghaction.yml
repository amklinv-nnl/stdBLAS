name: Build + Coverage

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cxx_std: [17, 20]

    steps:
      - uses: actions/checkout@v4

      # ---------------------------
      # macOS: LLVM
      # ---------------------------
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set LLVM env
        if: runner.os == 'macOS'
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure (coverage)
        if: runner.os == 'macOS'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }}
          -DCMAKE_CXX_COMPILER=clang++
          -DLINALG_ENABLE_TESTS=ON
          -DLINALG_ENABLE_COVERAGE=ON

      - name: Configure (normal)
        if: runner.os != 'macOS'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }}
          -DLINALG_ENABLE_TESTS=ON

      # ---------------------------
      # Build + Test
      # ---------------------------
      - name: Build
        run: cmake --build build -j

      - name: Run tests (coverage)
        if: runner.os == 'macOS'
        run: |
          LLVM_PROFILE_FILE="coverage-${{ matrix.cxx_std }}-%p.profraw" \
          ctest --test-dir build --output-on-failure

      - name: Run tests
        if: runner.os != 'macOS'
        run: ctest --test-dir build --output-on-failure

      # ---------------------------
      # Collect artifacts (macOS only)
      # ---------------------------
      - name: Collect coverage artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p coverage_artifacts/bin
          mkdir -p coverage_artifacts/lib

          # Get test binaries
          ctest --test-dir build -N -V 2>/dev/null \
            | grep "Test command:" \
            | sed 's/.*Test command: //' \
            | awk '{print $1}' > coverage_artifacts/test_binaries.txt

          while read bin; do
            if [ -f "$bin" ]; then
              cp "$bin" coverage_artifacts/bin/
            fi
          done < coverage_artifacts/test_binaries.txt

          # Copy shared libs
          for bin in coverage_artifacts/bin/*; do
            otool -L "$bin" | awk '{print $1}' | grep -v "^/usr/lib" | while read lib; do
              [ -f "$lib" ] && cp -n "$lib" coverage_artifacts/lib/ || true
            done
          done

      - name: Upload artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.cxx_std }}
          path: |
            **/*.profraw
            coverage_artifacts/

  coverage:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Set LLVM env
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set library path
        run: |
          export DYLD_LIBRARY_PATH=$(find artifacts -type d -name lib | paste -sd :)
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      # ---------------------------
      # Generate per-standard reports
      # ---------------------------
      - name: Generate reports
        run: |
          mkdir -p coverage/cxx17
          mkdir -p coverage/cxx20

          for STD in 17 20; do
            echo "Processing C++$STD..."

            FILES=$(find artifacts/coverage-$STD -name "*.profraw")
            BINARIES=$(find artifacts/coverage-$STD -path "*/coverage_artifacts/bin/*" -type f)

            $LLVM_PREFIX/bin/llvm-profdata merge -sparse $FILES -o coverage-$STD.profdata

            $LLVM_PREFIX/bin/llvm-cov show \
              $BINARIES \
              -instr-profile=coverage-$STD.profdata \
              -format=html \
              -output-dir=coverage/cxx$STD \
              -ignore-filename-regex='^(?!.*\/include\/).*'
          done

      # ---------------------------
      # Create combined UI
      # ---------------------------
      - name: Create index
        run: |
          cat > coverage/index.html <<EOF
          <html>
          <head><title>Coverage Dashboard</title></head>
          <body>
          <h1>Coverage Reports</h1>
          <ul>
            <li><a href="cxx17/index.html">C++17 Coverage</a></li>
            <li><a href="cxx20/index.html">C++20 Coverage</a></li>
          </ul>
          </body>
          </html>
          EOF

      # ---------------------------
      # Upload
      # ---------------------------
      - name: Upload coverage site
        uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: |
            coverage-17.profdata
            coverage-20.profdata
          use_oidc: true
