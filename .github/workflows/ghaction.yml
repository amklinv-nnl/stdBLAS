name: build/test

on: [push, pull_request]

jobs:
  osmatrix: 
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [Debug, RelWithDebInfo]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check Out mdspan
      uses: actions/checkout@v4
      with:
        repository: kokkos/mdspan
        path: mdspan-src

    - name: create directories
      run: cmake -E make_directory mdspan-build stdblas-build

    - name: Configure mdspan
      run: cmake -S mdspan-src -B mdspan-build -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_INSTALL_PREFIX=mdspan-install

    - name: Build mdspan
      run: cmake --build mdspan-build -j 3

    - name: Install mdspan
      run: cmake --install mdspan-build

    - name: Check Out stdblas
      uses: actions/checkout@v4
      with:
        path: stdblas-src
  
    - name: Configure stdblas
      run: cmake -S stdblas-src -B stdblas-build -Dmdspan_DIR=mdspan-install -DLINALG_ENABLE_TESTS=On -DLINALG_ENABLE_EXAMPLES=On -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_INSTALL_PREFIX=stdblas-install

    - name: Build stdblas
      run: cmake --build stdblas-build -j 3

    - name: Test stdblas
      working-directory: stdblas-build
      run: ctest --output-on-failure
        
    - name: Install stdblas
      run: cmake --install stdblas-build
