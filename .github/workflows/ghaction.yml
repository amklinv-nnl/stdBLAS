name: Unified C++ Coverage (17 + 20)

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        cxx_std: [17, 20]

    steps:
      - uses: actions/checkout@v4

      # ---------------------------
      # LLVM setup
      # ---------------------------
      - name: Install LLVM
        run: brew install llvm

      - name: Set LLVM env
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure
        run: |
          cmake -B build-${{ matrix.cxx_std }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }} \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLINALG_ENABLE_TESTS=ON \
            -DLINALG_ENABLE_COVERAGE=ON

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build
        run: cmake --build build-${{ matrix.cxx_std }} -j

      # ---------------------------
      # Run tests (generate profraw)
      # ---------------------------
      - name: Run tests
        run: |
          LLVM_PROFILE_FILE="cxx${{ matrix.cxx_std }}-%p.profraw" \
          ctest --test-dir build-${{ matrix.cxx_std }} --output-on-failure

      # ---------------------------
      # Merge profraw → profdata
      # ---------------------------
      - name: Merge coverage data
        run: |
          $LLVM_PREFIX/bin/llvm-profdata merge \
            -sparse cxx${{ matrix.cxx_std }}-*.profraw \
            -o cxx${{ matrix.cxx_std }}.profdata

      # ---------------------------
      # Generate LCOV (Codecov input)
      # ---------------------------
      - name: Generate LCOV
        run: |
          BIN=$(find build-${{ matrix.cxx_std }} -type f -perm +111 | head -n 1)

          $LLVM_PREFIX/bin/llvm-cov export \
            $BIN \
            -instr-profile=cxx${{ matrix.cxx_std }}.profdata \
            --format=lcov > cxx${{ matrix.cxx_std }}.lcov

      # ---------------------------
      # Upload LCOV artifact (for Pages job)
      # ---------------------------
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.cxx_std }}
          path: |
            cxx${{ matrix.cxx_std }}.lcov

      # ---------------------------
      # Codecov upload (UNIFIED INPUT)
      # ---------------------------
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: cxx${{ matrix.cxx_std }}.lcov
          use_oidc: true
          fail_ci_if_error: true


  # -------------------------------------------------------
  # OPTIONAL: merge artifacts for GitHub Pages dashboard
  # -------------------------------------------------------
  pages-data:
    needs: coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download LCOV artifacts
        uses: actions/download-artifact@v4
        with:
          path: lcov

      - name: Prepare dashboard artifact
        run: |
          mkdir -p coverage-dashboard
          cp lcov/**/cxx*.lcov coverage-dashboard/coverage.lcov

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: coverage-dashboard