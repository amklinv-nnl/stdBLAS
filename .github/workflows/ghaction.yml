name: Build + Coverage

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cxx_std: [17, 20]

    steps:
      - uses: actions/checkout@v4

      # ---------------------------
      # macOS LLVM setup
      # ---------------------------
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set LLVM env (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure (macOS coverage)
        if: runner.os == 'macOS'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }}
          -DCMAKE_CXX_COMPILER=clang++
          -DLINALG_ENABLE_TESTS=ON
          -DLINALG_ENABLE_COVERAGE=ON

      - name: Configure (non-macOS)
        if: runner.os != 'macOS'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }}
          -DLINALG_ENABLE_TESTS=ON

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build
        run: cmake --build build -j

      # ---------------------------
      # Run tests (macOS coverage enabled)
      # ---------------------------
      - name: Run tests (macOS coverage)
        if: runner.os == 'macOS'
        run: |
          LLVM_PROFILE_FILE="coverage-${{ matrix.cxx_std }}-%p.profraw" \
          ctest --test-dir build --output-on-failure

      - name: Run tests
        if: runner.os != 'macOS'
        run: ctest --test-dir build --output-on-failure

      # ---------------------------
      # Collect artifacts (macOS only)
      # ---------------------------
      - name: Collect artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p coverage_artifacts/bin
          mkdir -p coverage_artifacts/lib

          ctest --test-dir build -N -V 2>/dev/null \
            | grep "Test command:" \
            | sed 's/.*Test command: //' \
            | awk '{print $1}' > coverage_artifacts/test_binaries.txt

          while read bin; do
            if [ -f "$bin" ]; then
              cp "$bin" coverage_artifacts/bin/
            fi
          done < coverage_artifacts/test_binaries.txt

      - name: Upload build artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.cxx_std }}
          path: |
            **/*.profraw
            coverage_artifacts/

  coverage:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Set LLVM env
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ---------------------------
      # Fix runtime library path
      # ---------------------------
      - name: Set DYLD_LIBRARY_PATH
        run: |
          echo "DYLD_LIBRARY_PATH=$(find artifacts -type d -name lib | paste -sd :)" >> $GITHUB_ENV

      # ---------------------------
      # Generate coverage reports
      # ---------------------------
      - name: Generate HTML + LCOV reports
        run: |
          mkdir -p coverage/cxx17
          mkdir -p coverage/cxx20

          for STD in 17 20; do
            echo "Processing C++$STD..."

            FILES=$(find artifacts -name "coverage-$STD-*.profraw")
            BINARIES=$(find artifacts -path "*/coverage_artifacts/bin/*" -type f)

            if [ -z "$FILES" ]; then
              echo "No profraw files for C++$STD"
              continue
            fi

            $LLVM_PREFIX/bin/llvm-profdata merge -sparse $FILES -o coverage-$STD.profdata

            # ---------------------------
            # HTML report (your dashboard)
            # ---------------------------
            $LLVM_PREFIX/bin/llvm-cov show \
              $BINARIES \
              -instr-profile=coverage-$STD.profdata \
              -format=html \
              -output-dir=coverage/cxx$STD \
              -ignore-filename-regex='^(?!.*\/include\/).*'

            # ---------------------------
            # LCOV report (for Codecov)
            # ---------------------------
            $LLVM_PREFIX/bin/llvm-cov export \
              $BINARIES \
              -instr-profile=coverage-$STD.profdata \
              --format=lcov > coverage-$STD.lcov
          done

      # ---------------------------
      # Combined dashboard
      # ---------------------------
      - name: Create index page
        run: |
          mkdir -p coverage
          cat > coverage/index.html <<EOF
          <html>
          <head><title>Coverage Dashboard</title></head>
          <body>
          <h1>Coverage Reports</h1>
          <ul>
            <li><a href="cxx17/index.html">C++17 Coverage</a></li>
            <li><a href="cxx20/index.html">C++20 Coverage</a></li>
          </ul>
          </body>
          </html>
          EOF

      # ---------------------------
      # Upload HTML site
      # ---------------------------
      - name: Upload coverage site
        uses: actions/upload-artifact@v4
        with:
          name: coverage-site
          path: coverage/

      # ---------------------------
      # Upload to Codecov (FIXED)
      # ---------------------------
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: |
            coverage-17.lcov
            coverage-20.lcov
          use_oidc: true
          fail_ci_if_error: true
