name: stdBLAS

on: [push, pull_request]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo

jobs:
  osmatrix: 
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check Out mdspan
      uses: actions/checkout@v4
      with:
        repository: kokkos/mdspan
        path: mdspan-src

    - name: create directories
      run: cmake -E make_directory mdspan-build stdblas-build

    - name: Configure mdspan
      working-directory: mdspan-build
      run: cmake -S ${{ github.workspace }}/mdspan-src -B ${{ github.workspace }}/mdspan-build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/mdspan-install

    - name: Build mdspan
      working-directory: mdspan-build
      run: cmake --build ${{ github.workspace }}/mdspan-build -j 3

    - name: Install mdspan
      working-directory: mdspan-build
      run: cmake --install ${{ github.workspace }}/mdspan-build

    - name: Check Out
      uses: actions/checkout@v4
      with:
        path: stdblas-src
  
    - name: Configure stdblas
      shell: bash
      working-directory: stdblas-build
      run: cmake -S ${{ github.workspace }}/stdblas-src -B ${{ github.workspace }}/stdblas-build -Dmdspan_DIR=${{ github.workspace }}/mdspan-install/ -DLINALG_ENABLE_TESTS=On -DLINALG_ENABLE_EXAMPLES=On -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stdblas-install

    - name: Build stdblas
      working-directory: stdblas-build
      shell: bash
      run: cmake --build ${{ github.workspace }}/stdblas-build -j 3

    - name: Test stdblas
      working-directory: stdblas-build
      shell: bash
      run: ctest --output-on-failure
        
    - name: Install stdblas
      working-directory: stdblas-build
      shell: bash
      run: cmake --install ${{ github.workspace }}/stdblas-build
