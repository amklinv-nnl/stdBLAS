name: build/test

on: [push, pull_request]

jobs:
  build-and-test: 
    strategy:
      # Don't cancel all other builds if one fails
      fail-fast: false
      matrix:
        # A full list of runners can be found here: 
        # https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [RelWithDebInfo]
        cxx-standard: [17,20]
        # In theory, we would test on older compilers such as gcc 7.5, clang 9, and vs 2019
        # They are not installed on the runners by default, leaving this as a TODO item for now.
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check Out mdspan
      uses: actions/checkout@v4
      with:
        repository: kokkos/mdspan
        path: mdspan-src

    - name: create directories
      run: cmake -E make_directory mdspan-build stdblas-build

    - name: Configure mdspan
      run: cmake -S mdspan-src -B mdspan-build -DMDSPAN_CXX_STANDARD=${{matrix.cxx-standard}} -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_INSTALL_PREFIX=mdspan-install

    - name: Build mdspan
      run: cmake --build mdspan-build -j 3

    - name: Install mdspan
      run: cmake --install mdspan-build

    - name: Check Out stdblas
      uses: actions/checkout@v4
      with:
        path: stdblas-src
  
    - name: Configure stdblas (macOS)
      if: runner.os == 'macOS'
      run: |
        cmake -S stdblas-src -B stdblas-build \
        -Dmdspan_DIR=mdspan-install \
        -DLINALG_CXX_STANDARD=${{matrix.cxx-standard}} \
        -DLINALG_ENABLE_TESTS=On \
        -DLINALG_ENABLE_EXAMPLES=On \
        -DCMAKE_BUILD_TYPE=${{matrix.build-type}} \
        -DCMAKE_INSTALL_PREFIX=stdblas-install \
        -DLINALG_ENABLE_COVERAGE=ON

    # AMK 6/18/26: I couldn't find a cross platform way to split the string
    - name: Configure stdblas (Linux/Windows)
      if: runner.os != 'macOS'
      run: cmake -S stdblas-src -B stdblas-build -Dmdspan_DIR=mdspan-install -DLINALG_CXX_STANDARD=${{matrix.cxx-standard}} -DLINALG_ENABLE_TESTS=On -DLINALG_ENABLE_EXAMPLES=On -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_INSTALL_PREFIX=stdblas-install

    - name: Build stdblas
      run: cmake --build stdblas-build -j 3

    - name: Test stdblas (macOS)
      if: runner.os == 'macOS'
      working-directory: stdblas-build
      run: |
        export LLVM_PROFILE_FILE="coverage-${{ matrix.cxx-standard }}-%p.profraw" 
        ctest --output-on-failure

    - name: Test stdblas (Linux/Windows)
      if: runner.os != 'macOS'
      working-directory: stdblas-build
      run: ctest --output-on-failure
        
    # ---------------------------
    # Debug: ensure profraw exists (macOS only)
    # ---------------------------
    - name: Debug profraw files
      if: runner.os == 'macOS'
      working-directory: stdblas-build
      run: |
        echo "Searching for profraw files..."
        find . -name "*.profraw" || true

    - name: Upload raw profiles
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: profraw-${{ matrix.cxx-standard }}
        path: stdblas-build/tests/native/coverage-${{ matrix.cxx-standard }}-*.profraw

    - name: Install stdblas
      run: cmake --install stdblas-build

  merge-and-report:
    runs-on: macos-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Set LLVM PATH (macOS)
        run: echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      # ---------------------------
      # Download all profraw artifacts (macOS only outputs exist)
      # ---------------------------
      - name: Download profraw artifacts
        uses: actions/download-artifact@v4
        with:
          path: profraws

      # ---------------------------
      # Merge coverage profiles
      # ---------------------------
      - name: Merge profiles
        run: |
          FILES=$(find profraws -name "*.profraw")
          if [ -z "$FILES" ]; then
            echo "No profraw files found!"
            exit 1
          fi

          llvm-profdata merge -sparse $FILES -o coverage.profdata

      # ---------------------------
      # Rebuild one instrumented binary (needed for llvm-cov)
      # ---------------------------
      - name: Rebuild (for coverage report)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLINALG_ENABLE_TESTS=ON \
            -DLINALG_ENABLE_COVERAGE=ON

          cmake --build build -j

      # ---------------------------
      # Collect binaries
      # ---------------------------
      - name: Collect binaries
        id: binaries
        run: |
          BINARIES=$(find build -type f -executable \
            ! -path "*/CMakeFiles/*" \
            ! -path "*/_deps/*")

          echo "binaries<<EOF" >> $GITHUB_OUTPUT
          echo "$BINARIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------------------
      # Coverage summary
      # ---------------------------
      - name: Coverage summary
        run: |
          llvm-cov report \
            ${{ steps.binaries.outputs.binaries }} \
            -instr-profile=coverage.profdata \
            -ignore-filename-regex='(tests|_deps|googletest|/usr/)'

      # ---------------------------
      # HTML report
      # ---------------------------
      - name: Generate HTML report
        run: |
          llvm-cov show \
            ${{ steps.binaries.outputs.binaries }} \
            -instr-profile=coverage.profdata \
            -format=html \
            -output-dir=coverage-report \
            -ignore-filename-regex='(tests|_deps|googletest|/usr/)'

      # ---------------------------
      # Export LCOV for Codecov
      # ---------------------------
      - name: Export LCOV
        run: |
          llvm-cov export \
            ${{ steps.binaries.outputs.binaries }} \
            -instr-profile=coverage.profdata \
            -format=lcov > coverage.info

      # ---------------------------
      # Upload HTML artifact
      # ---------------------------
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      # ---------------------------
      # Upload to Codecov
      # ---------------------------
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
