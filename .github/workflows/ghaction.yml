name: Build + Coverage

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cxx_std: [17, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # macOS: install LLVM
      # ---------------------------
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Set LLVM env (macOS)
        if: runner.os == 'macOS'
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Configure
      # ---------------------------
      - name: Configure (macOS coverage)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }} -DCMAKE_CXX_COMPILER=clang++ -DLINALG_ENABLE_TESTS=ON -DLINALG_ENABLE_COVERAGE=ON

      - name: Configure (others)
        if: runner.os != 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }} -DLINALG_ENABLE_TESTS=ON

      # ---------------------------
      # Build
      # ---------------------------
      - name: Build
        run: cmake --build build -j

      # ---------------------------
      # Run tests
      # ---------------------------
      - name: Run tests (coverage)
        if: runner.os == 'macOS'
        run: |
          export LLVM_PROFILE_FILE="coverage-${{ matrix.cxx_std }}-%p.profraw"
          ctest --test-dir build --output-on-failure

      - name: Run tests (normal)
        if: runner.os != 'macOS'
        run: ctest --test-dir build --output-on-failure

      - name: Debug profraw files (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Looking for profraw files..."
          find . -name "*.profraw" || true

      # ---------------------------
      # Collect minimal coverage artifacts
      # ---------------------------
      - name: Collect coverage artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p coverage_artifacts/bin
          mkdir -p coverage_artifacts/lib

          # Extract test binaries deterministically
          ctest --test-dir build -N -V 2>/dev/null \
            | grep "Test command:" \
            | sed 's/.*Test command: //' \
            | awk '{print $1}' > coverage_artifacts/test_binaries.txt

          # Copy test executables
          while read bin; do
            if [ -f "$bin" ]; then
              cp "$bin" coverage_artifacts/bin/
            fi
          done < coverage_artifacts/test_binaries.txt

          # Copy dependent shared libraries (non-system)
          for bin in coverage_artifacts/bin/*; do
            otool -L "$bin" | awk '{print $1}' | grep -v "^/usr/lib" | while read lib; do
              if [ -f "$lib" ]; then
                cp -n "$lib" coverage_artifacts/lib/ || true
              fi
            done
          done

      # ---------------------------
      # Upload minimal artifacts
      # ---------------------------
      - name: Upload coverage artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.cxx_std }}
          path: |
            **/*.profraw
            coverage_artifacts/


  merge:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Set LLVM env
        run: echo "LLVM_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV

      # ---------------------------
      # Download artifacts
      # ---------------------------
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ---------------------------
      # Merge profiles
      # ---------------------------
      - name: Merge profiles
        run: |
          FILES=$(find artifacts -name "*.profraw")
          if [ -z "$FILES" ]; then
            echo "No profraw files found!"
            exit 1
          fi

          $LLVM_PREFIX/bin/llvm-profdata merge \
            -sparse $FILES \
            -o coverage.profdata

      # ---------------------------
      # Fix library paths
      # ---------------------------
      - name: Set DYLD_LIBRARY_PATH
        run: |
          export DYLD_LIBRARY_PATH=$(find artifacts -type d -name lib | paste -sd :)
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      # ---------------------------
      # Collect binaries
      # ---------------------------
      - name: Collect binaries
        id: binaries
        run: |
          BINARIES=$(find artifacts -path "*/coverage_artifacts/bin/*" -type f)

          echo "binaries<<EOF" >> $GITHUB_OUTPUT
          echo "$BINARIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------------------
      # Coverage summary (include-only)
      # ---------------------------
      - name: Coverage summary
        run: |
          echo "${{ steps.binaries.outputs.binaries }}" | xargs \
            $LLVM_PREFIX/bin/llvm-cov report \
            -instr-profile=coverage.profdata \
            -ignore-filename-regex='^(?!.*\/include\/).*'

      # ---------------------------
      # HTML report (include-only)
      # ---------------------------
      - name: Generate HTML report
        run: |
          echo "${{ steps.binaries.outputs.binaries }}" | xargs \
            $LLVM_PREFIX/bin/llvm-cov show \
            -instr-profile=coverage.profdata \
            -format=html \
            -output-dir=coverage-report \
            -ignore-filename-regex='^(?!.*\/include\/).*'

      # ---------------------------
      # Export LCOV (include-only)
      # ---------------------------
      - name: Export LCOV
        run: |
          echo "${{ steps.binaries.outputs.binaries }}" | xargs \
            $LLVM_PREFIX/bin/llvm-cov export \
            -instr-profile=coverage.profdata \
            -format=lcov \
            -ignore-filename-regex='^(?!.*\/include\/).*' \
            > coverage.info

      # ---------------------------
      # Upload report
      # ---------------------------
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
